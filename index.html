              { q: "מָה הָיְתָה הַכְּמִיהָה שֶׁל יָעֵל וְתוֹמֵר בְּסוֹף הַסִּיפּוּר?", options: ["לְהַצְלִיחַ בַּמִּבְחָן בְּבֵית הַסֵּפֶר", "לְיָמִים שֶׁל שָׁלוֹם וְשַׁלְוָה שֶׁבָּהֶם אֶפְשָׁר לְשַׂחֵק לְלֹא פַּחַד", "לִשְׁתּוֹל עוֹד פְּרָחִים אֲדוּמִּים בַּגִּינָּה"], correct: 1, type: "הַסָּקַת מַסְקָנוֹת" },
              { q: "לְמָה מְדַמֶּה הַטֶּקְסְט אֶת הַתִּקְוָה?", options: ["לָאוֹר שֶׁמְּנַצֵּחַ אֶת הַחוֹשֶׁךְ", "לִזְרָעִים שֶׁדּוֹרְשִׁים טִיפּוּחַ, אֱמוּנָה וְאוֹרֶךְ רוּחַ", "לְיָמִים שֶׁל מִלְחָמָה וּפַחַד"], correct: 1, type: "אִיתּוּר פְּרָטִים" },
              { 
                type: "grammar", 
                q: "הַשְׁלִימוּ אֶת טַבְלַת הַפְּעָלִים מִתּוֹךְ הַפִּסְקָה:", 
                verbs: [
                  { word: "לָמְדוּ", correct: { root: "ל-מ-ד", tense: "עָבָר", person: "נִסְתָּרִים (הֵם)" } },
                  { word: "יִמְצָא", correct: { root: "מ-צ-א", tense: "עָתִיד", person: "נִסְתָּר (הוּא)" } }
                ] 
              },
              { 
                type: "open", 
                q: "מָהוּ הַמֶּסֶר הַמֶּרְכָּזִי שֶׁרָצוּ לְהַעֲבִיר לָנוּ בַּסִּיפּוּר הַזֶּה לְדַעְתְּכֶם?"
              },
              {
                type: "open",
                q: "לְסִיּוּם, אֵיךְ לְדַעְתְּכֶם הַכּוֹתֶרֶת 'לַהֲפוֹךְ אֶת הַלִּימוֹן לְלִימוֹנָדָה' מִתְקַשֶּׁרֶת לְנוֹשֵׂא הַסִּיפּוּר וּלְמָה שֶׁעָבְרוּ יָעֵל וְתוֹמֵר?"
              }
            ]
          }
        ];

        const GRAMMAR_OPTIONS = {
          roots: ["ר-ח-פ", "ק-י-מ", "א-ל-צ", "ל-מ-ד", "מ-צ-א", "ב-י-נ", "ע-ד-ר", "ש-ת-ל"],
          tenses: ["עָבָר", "הוֹוֶה", "עָתִיד", "צִיוּוּי", "שֵׁם פּוֹעַל"],
          persons: ["מְדַבֵּר/ת (אֲנִי)", "מְדַבְּרִים/וֹת (אֲנַחְנוּ)", "נוֹכֵחַ (אַתָּה)", "נוֹכַחַת (אַתְּ)", "נוֹכְחִים (אַתֶּם)", "נוֹכְחוֹת (אַתֶּן)", "נִסְתָּר (הוּא)", "נִסְתֶּרֶת (הִיא)", "נִסְתָּרִים (הֵם)", "נִסְתָּרוֹת (הֵן)"]
        };

        const gardenWallpaperStyle = {
          backgroundColor: '#f0fdf4', 
          backgroundImage: `url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23bbf7d0' fill-opacity='0.6' fill-rule='evenodd'/%3E%3C/svg%3E")`,
          backgroundAttachment: 'fixed'
        };

        // --- רכיבים (Components) ---
        function MainApp() {
          const t = useT(); // The niqqud translation hook
          
          const [currentScreen, setCurrentScreen] = useState('welcome');
          const [score, setScore] = useState(0);
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [flippedCards, setFlippedCards] = useState([]);
          const [currentVocabQ, setCurrentVocabQ] = useState(0);
          const [currentAuditoryQ, setCurrentAuditoryQ] = useState(0); 
          
          const [currentParaIndex, setCurrentParaIndex] = useState(0);
          const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
          
          const [feedback, setFeedback] = useState(null); 
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [openText, setOpenText] = useState("");
          const [sortItems, setSortItems] = useState([]);
          const [grammarState, setGrammarState] = useState({});

          const stateRef = useRef({ currentScreen, currentVocabQ, currentAuditoryQ, currentParaIndex, currentQuestionIndex });
          useEffect(() => {
            stateRef.current = { currentScreen, currentVocabQ, currentAuditoryQ, currentParaIndex, currentQuestionIndex };
          });

          useEffect(() => {
            if (currentScreen === 'reading') {
              const q = PARAGRAPHS[currentParaIndex].questions[currentQuestionIndex];
              setFeedback(null);
              setSelectedAnswer(null);
              setOpenText("");
              
              if (q.type === 'sort') {
                let items = q.correctOrder.map((text, idx) => ({ id: idx, text }));
                items = [items[4], items[0], items[3], items[1], items[2]]; 
                setSortItems(items);
              }

              if (q.type === 'grammar') {
                const initial = {};
                q.verbs.forEach((_, idx) => {
                  initial[idx] = { root: "", tense: "", person: "" };
                });
                setGrammarState(initial);
              }
            }
          }, [currentParaIndex, currentQuestionIndex, currentScreen]);

          const playAudio = (word, audioText) => {
            const textToSpeak = audioText || word.replace(/[\u0591-\u05C7]/g, '');
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'he-IL';
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
          };

          const handleStart = () => setCurrentScreen('flashcards');

          const jumpTo = (screen, paraIndex = 0, vocabQ = 0, auditoryQ = 0) => {
            setCurrentScreen(screen);
            setCurrentParaIndex(paraIndex);
            setCurrentQuestionIndex(0);
            setCurrentVocabQ(vocabQ);
            setCurrentAuditoryQ(auditoryQ);
            setFeedback(null);
            setSelectedAnswer(null);
            setIsMenuOpen(false);
          };

          const triggerNext = useCallback(() => {
            const state = stateRef.current;
            if (state.currentScreen === 'vocab-practice') {
              if (state.currentVocabQ < VOCAB_PRACTICE.length - 1) {
                setCurrentVocabQ(prev => prev + 1);
                setFeedback(null); setSelectedAnswer(null);
              } else {
                jumpTo('auditory', 0, 0, 0);
              }
            } else if (state.currentScreen === 'auditory') {
              if (state.currentAuditoryQ < AUDITORY_PAIRS.length - 1) {
                setCurrentAuditoryQ(prev => prev + 1);
                setFeedback(null); setSelectedAnswer(null);
              } else {
                jumpTo('reading', 0, 0, 0); 
              }
            } else if (state.currentScreen === 'reading') {
              if (state.currentQuestionIndex < PARAGRAPHS[state.currentParaIndex].questions.length - 1) {
                setCurrentQuestionIndex(prev => prev + 1);
              } else {
                if (state.currentParaIndex < PARAGRAPHS.length - 1) {
                  setCurrentParaIndex(prev => prev + 1);
                  setCurrentQuestionIndex(0);
                } else {
                  setCurrentScreen('summary');
                }
              }
            }
          }, []);

          useEffect(() => {
            if (feedback === 'correct') {
              const timer = setTimeout(() => {
                triggerNext();
              }, 1500);
              return () => clearTimeout(timer);
            }
          }, [feedback, triggerNext]);

          const handleVocabAnswer = (selectedIndex) => {
            if (feedback === 'correct') return;
            setSelectedAnswer(selectedIndex);
            const isCorrect = selectedIndex === VOCAB_PRACTICE[currentVocabQ].correct;
            if (isCorrect) {
              setFeedback('correct');
              setScore(prev => prev + 10);
            } else setFeedback('incorrect');
          };

          const handleAuditoryAnswer = (selectedIndex) => {
            if (feedback === 'correct') return;
            setSelectedAnswer(selectedIndex);
            const isCorrect = selectedIndex === AUDITORY_PAIRS[currentAuditoryQ].correctIndex;
            if (isCorrect) {
              setFeedback('correct');
              setScore(prev => prev + 15); 
            } else setFeedback('incorrect');
          };

          const handleReadingAnswer = (selectedIndex) => {
            if (feedback === 'correct') return;
            setSelectedAnswer(selectedIndex);
            const isCorrect = selectedIndex === PARAGRAPHS[currentParaIndex].questions[currentQuestionIndex].correct;
            if (isCorrect) {
              setFeedback('correct');
              setScore(prev => prev + 10);
            } else setFeedback('incorrect');
          };

          const handleOpenSubmit = () => {
            if (openText.trim().length > 2) {
              setScore(prev => prev + 15);
              triggerNext(); 
            }
          };

          const handleSortMove = (index, direction) => {
            if (feedback === 'correct') return;
            const newItems = [...sortItems];
            if (direction === -1 && index > 0) {
              [newItems[index - 1], newItems[index]] = [newItems[index], newItems[index - 1]];
            } else if (direction === 1 && index < newItems.length - 1) {
              [newItems[index + 1], newItems[index]] = [newItems[index], newItems[index + 1]];
            }
            setSortItems(newItems);
          };

          const checkSortOrder = () => {
            const q = PARAGRAPHS[currentParaIndex].questions[currentQuestionIndex];
            let isCorrect = true;
            for (let i = 0; i < sortItems.length; i++) {
              if (sortItems[i].text !== q.correctOrder[i]) {
                isCorrect = false; break;
              }
            }
            if (isCorrect) {
              setFeedback('correct');
              setScore(prev => prev + 15);
            } else setFeedback('incorrect');
          };

          const updateGrammarState = (verbIdx, field, value) => {
            setGrammarState(prev => ({
              ...prev,
              [verbIdx]: { ...prev[verbIdx], [field]: value }
            }));
          };

          const checkGrammarAnswers = () => {
            const q = PARAGRAPHS[currentParaIndex].questions[currentQuestionIndex];
            let isAllCorrect = true;
            q.verbs.forEach((v, idx) => {
              if (
                grammarState[idx].root !== v.correct.root ||
                grammarState[idx].tense !== v.correct.tense ||
                grammarState[idx].person !== v.correct.person
              ) {
                isAllCorrect = false;
              }
            });
            if (isAllCorrect) {
              setFeedback('correct');
              setScore(prev => prev + 15);
            } else setFeedback('incorrect');
          };

          const getMenuBtnClass = (screen, paraIndex = -1) => {
            const isActive = currentScreen === screen && (paraIndex === -1 || currentParaIndex === paraIndex);
            return `w-full text-right p-3 rounded-xl transition-all flex items-center gap-3 ${
              isActive ? 'bg-green-100 text-green-800 font-bold shadow-sm' : 'text-stone-600 hover:bg-stone-50 hover:text-green-700 font-medium'
            }`;
          };

          const totalSteps = VOCAB_PRACTICE.length + AUDITORY_PAIRS.length + PARAGRAPHS.reduce((sum, p) => sum + p.questions.length, 0);
          let currentStep = 0;
          if (currentScreen === 'vocab-practice') currentStep = currentVocabQ;
          else if (currentScreen === 'auditory') currentStep = VOCAB_PRACTICE.length + currentAuditoryQ;
          else if (currentScreen === 'reading') {
            let readingSteps = 0;
            for (let i = 0; i < currentParaIndex; i++) readingSteps += PARAGRAPHS[i].questions.length;
            readingSteps += currentQuestionIndex;
            currentStep = VOCAB_PRACTICE.length + AUDITORY_PAIRS.length + readingSteps;
          } else if (currentScreen === 'summary') currentStep = totalSteps;
          
          const progressPercent = Math.max(2, (currentStep / totalSteps) * 100);
          const showProgress = ['vocab-practice', 'auditory', 'reading'].includes(currentScreen);

          return (
            <div className="flex-1 flex flex-col relative w-full pb-16">
              
              {/* מד התקדמות */}
              {showProgress && (
                <div className="fixed top-4 left-1/2 -translate-x-1/2 w-11/12 max-w-lg bg-white/90 backdrop-blur rounded-full h-5 shadow-md border-2 border-green-200 z-30 hidden sm:block">
                   <div 
                     className="h-full bg-gradient-to-l from-green-400 to-green-600 rounded-full transition-all duration-700 ease-out relative"
                     style={{ width: `${progressPercent}%` }}
                   >
                     <div className="absolute -left-4 top-1/2 -translate-y-1/2 bg-white rounded-full p-1.5 shadow-lg border-2 border-green-500 text-green-600 transform transition-transform hover:scale-110">
                        <Leaf size={20} className="fill-current animate-pulse" />
                     </div>
                   </div>
                </div>
              )}

              {/* Menu Button */}
              <button onClick={() => setIsMenuOpen(true)} className="fixed top-4 right-4 md:top-6 md:right-6 z-40 bg-white p-3 rounded-full shadow-lg border-2 border-green-200 text-green-700 hover:bg-green-50 transition-all hover:scale-110">
                <Menu size={28} />
              </button>

              {/* Menu Modal */}
              {isMenuOpen && (
                <div className="fixed inset-0 bg-stone-900/40 z-50 backdrop-blur-sm animate-in fade-in duration-200" onClick={() => setIsMenuOpen(false)}>
                  <div className="fixed top-0 right-0 w-72 h-full bg-white shadow-2xl p-6 overflow-y-auto border-l-4 border-green-500" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center mb-6">
                      <h2 className="text-2xl font-bold text-green-800 flex items-center gap-2"><Menu size={24}/> {t("תַּפְרִיט")}</h2>
                      <button onClick={() => setIsMenuOpen(false)} className="text-stone-400 hover:text-stone-800 bg-stone-100 p-2 rounded-full"><X size={20}/></button>
                    </div>
                    <div className="space-y-1">
                      <button onClick={() => jumpTo('welcome')} className={getMenuBtnClass('welcome')}><Home size={20}/> {t("מָסָךְ רָאשִׁי")}</button>
                      <button onClick={() => jumpTo('flashcards')} className={getMenuBtnClass('flashcards')}><Library size={20}/> {t("כַּרְטִיסִיּוֹת מִילִּים")}</button>
                      <button onClick={() => jumpTo('vocab-practice')} className={getMenuBtnClass('vocab-practice')}><PenTool size={20}/> {t("תִּרְגּוּל מִילִּים")}</button>
                      <button onClick={() => jumpTo('auditory')} className={getMenuBtnClass('auditory')}><Ear size={20}/> {t("אִימּוּן שְׁמִיעָתִי")}</button>
                      <div className="pt-5 pb-2 px-3 text-sm font-bold text-stone-400 border-t border-stone-100 mt-4">{t("קְרִיאָה וַהֲבָנָה")}</div>
                      {PARAGRAPHS.map((_, i) => (
                        <button key={i} onClick={() => jumpTo('reading', i)} className={getMenuBtnClass('reading', i)}>
                          <BookOpen size={20}/> {t(`פִּסְקָה ${String.fromCharCode(1488 + i)}'`)}
                        </button>
                      ))}
                      <div className="pt-5 pb-2 px-3 text-sm font-bold text-stone-400 border-t border-stone-100 mt-4">{t("סִיּוּם")}</div>
                      <button onClick={() => jumpTo('summary')} className={getMenuBtnClass('summary')}><Award size={20}/> {t("תְּעוּדַת סִיּוּם")}</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Screens */}
              {currentScreen === 'welcome' && (
                <div className="flex-1 flex flex-col items-center justify-center p-6 bg-white/40 backdrop-blur-sm pt-20">
                  <div className="bg-white/95 p-8 md:p-12 rounded-[2.5rem] shadow-2xl max-w-3xl text-center space-y-6 border-4 border-green-300 relative overflow-hidden">
                    <div className="absolute -top-12 -right-12 text-amber-100 opacity-50"><Sun size={200} /></div>
                    <div className="relative z-10 flex flex-col items-center">
                      <div className="bg-amber-100 text-amber-600 p-4 rounded-full mb-6 shadow-sm inline-block">
                        <Sparkles size={48} strokeWidth={2} className="animate-pulse" />
                      </div>
                      <h1 className="text-4xl md:text-5xl lg:text-6xl font-black text-green-800 leading-tight mb-4 drop-shadow-sm">
                        {t("לַהֲפוֹךְ אֶת הַלִּימוֹן לְלִימוֹנָדָה")}
                      </h1>
                      <div className="bg-stone-50 border-2 border-stone-100 p-6 md:p-8 rounded-3xl mb-8 shadow-inner">

        // --- Root App Wrapper (handles global state) ---
